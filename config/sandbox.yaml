judge:
  schedule: '@every 5s'
  submission_retry_delay: 5s
  languages:
    - value: c
      name: C
      compile:
        image: 'docker.io/library/gcc:9.5.0-bullseye'
        command_template: ['gcc', '-o', '$PROGRAM', '-O2', '$SOURCE']
        timeout: 30s
        cpu_quota: 4000000
        memory: 4GiB
        source_file_name: main.c
        program_file_name: a.out
      test_case_run:
        image: 'docker.io/library/debian:bullseye-slim'
        command_template: ['/usr/bin/timeout', '--foreground', '$TIME_LIMIT', './$PROGRAM']
        cpu_quota: 1000000

    - value: cpp
      name: C++
      compile:
        image: 'docker.io/library/gcc:9.5.0-bullseye'
        command_template: ['g++', '-o', '$PROGRAM', '-O2', '$SOURCE']
        timeout: 30s
        cpu_quota: 4000000
        memory: 4GiB
        source_file_name: main.cpp
        program_file_name: a.out
      test_case_run:
        image: 'docker.io/library/debian:bullseye-slim'
        command_template: ['/usr/bin/timeout', '--foreground', '$TIME_LIMIT', './$PROGRAM']
        cpu_quota: 1000000

    - value: java
      name: Java
      compile:
        image: 'docker.io/library/openjdk:22-jdk-slim-buster'
        command_template: ['javac', '$SOURCE']
        timeout: 30s
        cpu_quota: 4000000
        memory: 4GiB
        source_file_name: Main.java
        program_file_name: Main.class
      test_case_run:
        image: 'docker.io/library/openjdk:22-jdk-slim-buster'
        command_template: ['/usr/bin/timeout', '--foreground', '$TIME_LIMIT', 'java', '-Xms8m', '-Xmx32m', '-XX:ReservedCodeCacheSize=8m', '-XX:InitialCodeCacheSize=4m', '-XX:MetaspaceSize=8m', '-XX:MaxMetaspaceSize=16m', '-XX:+UseSerialGC', '-XX:-UsePerfData', '-XX:-UseCompressedOops', '-XX:-UseCompressedClassPointers', 'Main']
        cpu_quota: 1000000

    - value: python
      name: Python 3
      test_case_run:
        image: 'docker.io/library/python:3.13-rc-slim'
        command_template: ['/usr/bin/timeout', '--foreground', '$TIME_LIMIT', 'python3', '$PROGRAM']
        cpu_quota: 1000000
        source_file_name: main.py
        program_file_name: main.py

sync_problem:
  schedule: '@every 1m'
  get_problem_snippet_list_batch_size: 10
  get_test_case_snippet_list_batch_size: 10
