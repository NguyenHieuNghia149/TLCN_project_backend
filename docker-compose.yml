services:
  # Redis for BullMQ Queue (DB dedicated instance)
  redis-queue:
    image: redis:7-alpine
    volumes:
      - redis_queue_data:/data
    expose:
      - '6379'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy noeviction

  # Redis for Cache / PubSub (eviction allowed)
  redis-cache:
    image: redis:7-alpine
    volumes:
      - redis_cache_data:/data
    expose:
      - '6379'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 128mb --maxmemory-policy allkeys-lru

  # Main API Server
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: api
    expose:
      - '3001'
    ports:
      - '3001:3001'
    environment:
      - UV_THREADPOOL_SIZE=${UV_THREADPOOL_SIZE:-32}
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis-queue:6379
      - REDIS_QUEUE_URL=redis://redis-queue:6379
      - REDIS_CACHE_URL=redis://redis-cache:6379
      - SANDBOX_URL=http://sandbox:4000
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - PROCTORING_SOCKET_TOKEN_SECRET=${PROCTORING_SOCKET_TOKEN_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSL=${DB_SSL:-true}
      - DB_POOL_MIN=${DB_POOL_MIN:-0}
      - DB_POOL_MAX=${DB_POOL_MAX:-50}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS:-12}
      - AUTH_LAST_LOGIN_AUDIT_CONCURRENCY=${AUTH_LAST_LOGIN_AUDIT_CONCURRENCY:-2}
      - AUTH_LAST_LOGIN_AUDIT_MAX_PENDING=${AUTH_LAST_LOGIN_AUDIT_MAX_PENDING:-1000}
      - JUDGE_QUEUE_MAX_BACKLOG=${JUDGE_QUEUE_MAX_BACKLOG:-5000}
      - JUDGE_QUEUE_REMOVE_ON_FAIL_COUNT=${JUDGE_QUEUE_REMOVE_ON_FAIL_COUNT:-1000}
      - JUDGE_QUEUE_REMOVE_ON_FAIL_AGE_SECONDS=${JUDGE_QUEUE_REMOVE_ON_FAIL_AGE_SECONDS:-86400}
      - API_PERF_TRACE=${API_PERF_TRACE:-false}
      - SUBMISSION_METADATA_CACHE_TTL_MS=${SUBMISSION_METADATA_CACHE_TTL_MS:-60000}
      - SUBMISSION_METADATA_CACHE_MAX_SIZE=${SUBMISSION_METADATA_CACHE_MAX_SIZE:-1000}
      - DISABLE_RATE_LIMITS=${DISABLE_RATE_LIMITS:-true}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - BULL_BOARD_USERNAME=${BULL_BOARD_USERNAME}
      - BULL_BOARD_PASSWORD=${BULL_BOARD_PASSWORD}
    depends_on:
      redis-queue:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env
  # Sandbox Service (Isolated)
  sandbox:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: sandbox
    # Some VPS kernels still block nsjail procfs mounts unless the container
    # runs fully privileged, even with SYS_ADMIN + unconfined security opts.
    privileged: true
    expose:
      - '4000'
    environment:
      - NODE_ENV=${NODE_ENV}
      - SANDBOX_PORT=${SANDBOX_PORT:-4000}
      - SANDBOX_GRPC_PORT=${SANDBOX_GRPC_PORT:-50051}
      - WORKSPACE_DIR=/app/workspace
      - HOST_WORKSPACE_DIR=${HOST_WORKSPACE_DIR:-./workspace}
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - apparmor:unconfined
      - seccomp=unconfined
    volumes:
      - ./workspace:/app/workspace
      - ./security:/app/security
      - ./logs:/app/logs
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker Service
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: worker
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis-queue:6379
      - REDIS_QUEUE_URL=redis://redis-queue:6379
      - REDIS_CACHE_URL=redis://redis-cache:6379
      - SANDBOX_URL=http://sandbox:4000
      - SANDBOX_GRPC_URL=sandbox:50051
      - SERVER_AI_URL=http://server-ai:8001
      - SERVER_AI_INTERNAL_TOKEN=${SERVER_AI_INTERNAL_TOKEN}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSL=${DB_SSL:-true}
      - DB_POOL_MIN=${DB_POOL_MIN:-0}
      - DB_POOL_MAX=${DB_POOL_MAX:-50}
    depends_on:
      - api
      - sandbox
      - redis-queue
      - redis-cache
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env
    deploy:
      replicas: 2

  # AI Proctoring Service (Python / FastAPI)
  server-ai:
    build:
      context: ../server-ai
      dockerfile: Dockerfile
    expose:
      - '8001'
    environment:
      - SERVER_AI_ENVIRONMENT=production
      - SERVER_AI_INTERNAL_TOKEN=${SERVER_AI_INTERNAL_TOKEN}
      - SERVER_AI_MODEL_PATH=/app/models/isolation_forest/v1/model.joblib
      - SERVER_AI_LLM_SUMMARY_PROVIDER=${SERVER_AI_LLM_SUMMARY_PROVIDER:-disabled}
      - SERVER_AI_LLM_SUMMARY_MODEL=/models/llm/${SERVER_AI_LLM_SUMMARY_MODEL_FILE:-gemma-2-2b-it-Q4_K_M.gguf}
      - SERVER_AI_LLM_SUMMARY_TIMEOUT_SECONDS=${SERVER_AI_LLM_SUMMARY_TIMEOUT_SECONDS:-30}
      - SERVER_AI_LLM_SUMMARY_TEMPERATURE=${SERVER_AI_LLM_SUMMARY_TEMPERATURE:-0.0}
      - SERVER_AI_LLM_SUMMARY_JUDGE_PROVIDER=${SERVER_AI_LLM_SUMMARY_JUDGE_PROVIDER:-disabled}
      - SERVER_AI_LLM_SUMMARY_JUDGE_MODEL=/models/llm/${SERVER_AI_LLM_SUMMARY_JUDGE_MODEL_FILE:-qwen2.5-0.5b-instruct-q4_k_m.gguf}
      - SERVER_AI_LLM_SUMMARY_JUDGE_TEMPERATURE=${SERVER_AI_LLM_SUMMARY_JUDGE_TEMPERATURE:-0.0}
      - SERVER_AI_LLM_SUMMARY_MIN_VALIDATION_SCORE_FLOOR=${SERVER_AI_LLM_SUMMARY_MIN_VALIDATION_SCORE_FLOOR:-0.5}
      - SERVER_AI_LLM_SUMMARY_PRIVACY_APPROVED=${SERVER_AI_LLM_SUMMARY_PRIVACY_APPROVED:-true}
    volumes:
      - server_ai_models:/app/models
      - ${SERVER_AI_LLM_MODELS_DIR:-./data/llm-models}:/models/llm
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python', '-c', 'import http.client; conn=http.client.HTTPConnection("localhost:8001"); conn.request("GET","/healthz"); resp=conn.getresponse(); exit(0) if resp.status==200 else exit(1)']
      interval: 30s
      timeout: 5s
      retries: 3

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
      - sandbox
    restart: unless-stopped

volumes:
  redis_queue_data:
  redis_cache_data:
  server_ai_models:


