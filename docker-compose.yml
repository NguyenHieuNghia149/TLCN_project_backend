services:
  # Redis for BullMQ Queue (DB dedicated instance)
  redis-queue:
    image: redis:7-alpine
    volumes:
      - redis_queue_data:/data
    expose:
      - '6379'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy noeviction

  # Redis for Cache / PubSub (eviction allowed)
  redis-cache:
    image: redis:7-alpine
    volumes:
      - redis_cache_data:/data
    expose:
      - '6379'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 128mb --maxmemory-policy allkeys-lru

  # Main API Server
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    expose:
      - '3001'
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis-queue:6379
      - REDIS_QUEUE_URL=redis://redis-queue:6379
      - REDIS_CACHE_URL=redis://redis-cache:6379
      - SANDBOX_URL=http://sandbox:4000
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - BULL_BOARD_USERNAME=${BULL_BOARD_USERNAME}
      - BULL_BOARD_PASSWORD=${BULL_BOARD_PASSWORD}
    depends_on:
      redis-queue:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env

  # Sandbox Service (Isolated)
  sandbox:
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
    expose:
      - '4000'
    environment:
      - NODE_ENV=${NODE_ENV}
      - SANDBOX_PORT=${SANDBOX_PORT:-4000}
      - SANDBOX_GRPC_PORT=${SANDBOX_GRPC_PORT:-50051}
      - WORKSPACE_DIR=/app/workspace
      - HOST_WORKSPACE_DIR=${HOST_WORKSPACE_DIR:-./workspace}
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./workspace:/app/workspace
      - ./security:/app/security
      - ./logs:/app/logs
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker Service
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis-queue:6379
      - REDIS_QUEUE_URL=redis://redis-queue:6379
      - REDIS_CACHE_URL=redis://redis-cache:6379
      - SANDBOX_URL=http://sandbox:4000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - api
      - sandbox
      - redis-queue
      - redis-cache
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env
    deploy:
      replicas: 2

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
      - sandbox
    restart: unless-stopped

volumes:
  redis_queue_data:
  redis_cache_data:
