name: Backend CI

on:
  push:
    branches: [develop, main, production]
  pull_request:
    branches: [develop, main]

env:
  NODE_ENV: test
  JWT_ACCESS_SECRET: ci-test-access-secret
  JWT_REFRESH_SECRET: ci-test-refresh-secret
  DB_HOST: localhost
  DB_PORT: 5432
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_NAME: postgres
  DB_SSL: false
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Build (typecheck)
        run: npm run build

      - name: Push DB schema
        run: npm run db:push

      - name: Test
        run: npm test -- --testPathIgnorePatterns='submission.controller' --testPathIgnorePatterns='proctoring-precheck.service' --testPathIgnorePatterns='proctoring-data-request.service' --testPathIgnorePatterns='run-with-env'