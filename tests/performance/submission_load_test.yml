config:
  target: 'http://localhost:3000/api'
  phases:
    - duration: 60
      arrivalRate: 5
      rampTo: 20
      name: Heavy load test
  defaults:
    headers:
      Content-Type: 'application/json'

scenarios:
  - name: 'Submit Fibonacci Solution'
    flow:
      - post:
          url: '/submissions'
          json:
            problemId: '0f465ec8-b3a7-402e-8d5a-a7e99a2f37cb' # Thay bằng ID thật
            language: 'cpp'
            sourceCode: "#include <iostream>\n#include <vector>\n#include <unordered_map>\nusing namespace std;\n\nvector<int> twoSum(vector<int>& nums, int target) {\n    unordered_map<int, int> seen;\n    for (int i = 0; i < nums.size(); i++) {\n        int complement = target - nums[i];\n        if (seen.count(complement)) {\n            return {seen[complement], i};\n        }\n        seen[nums[i]] = i;\n    }\n    return {};\n}\n\nint main() {\n    int n;\n    cin >> n;\n    vector<int> nums(n);\n    for (int i = 0; i < n; i++) {\n        cin >> nums[i];\n    }\n\n    int target;\n    cin >> target;\n\n    vector<int> result = twoSum(nums, target);\n    cout << \"[\" << result[0] << \",\" << result[1] << \"]\" << endl;\n\n    return 0;\n}\n"
          capture:
            - json: '$.submissionId'
              as: 'submissionId'
      - think: 2
      - get:
          url: '/submissions/{{ submissionId }}'
