events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;

    # Dynamic CORS origin mapping
    map $http_origin $cors_origin {
        default 'https://app.virgodapoet.site';
        "http://localhost:3000" "$http_origin";
        "http://localhost:5173" "$http_origin";
        "https://app.virgodapoet.site" "$http_origin";
        "https://app.algoforge.site" "$http_origin";
        "https://sandbox.algoforge.site" "$http_origin";
        "https://api.algoforge.site" "$http_origin";
    }

    # Rate limiting (adjusted for API traffic: 20 req/s with burst)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=sandbox_limit:10m rate=10r/s;


    server {
        listen 80;
        server_name api.virgodapoet.site localhost;
        set $api_backend http://api:3001;

        # API endpoints
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH';
                add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Requested-With,X-CSRF-Token';
                add_header 'Access-Control-Allow-Credentials' 'true';
                return 204;
            }
            # Hide CORS headers from backend to prevent duplicates
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Credentials';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            proxy_pass $api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Server-Sent Events endpoint
        location /api/submissions/stream/ {
            # Keep the full request URI so :submissionId reaches the API route.
            proxy_pass $api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # CRITICAL FOR SSE: Disable buffering
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            
            # Long timeout for SSE keep-alive
            proxy_read_timeout 86400;
        }

        # Socket.io WebSocket endpoint
        location /socket.io/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Requested-With,X-CSRF-Token';
                add_header 'Access-Control-Allow-Credentials' 'true';
                return 204;
            }
            # Hide CORS headers from backend to prevent duplicates
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Credentials';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            proxy_pass $api_backend;
            proxy_http_version 1.1;
            
            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout settings for long-lived connections
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Health checks
        location /health {
            proxy_pass $api_backend/health;
        }

        # Default location
        location / {
            return 200 'Code Execution Platform API';
            add_header Content-Type text/plain;
        }
    }

    server {
        listen 80;
        server_name sandbox.virgodapoet.site sandbox.localhost;
        set $sandbox_backend http://sandbox:4000;

        location /sandbox/ {
            proxy_pass $sandbox_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
